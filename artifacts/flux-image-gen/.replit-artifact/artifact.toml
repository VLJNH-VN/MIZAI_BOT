kind = "web"
previewPath = "/"
title = "Flux AI Image Generator"
version = "1.0.0"
id = "artifacts/flux-image-gen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25907

[services.development]
run = "pnpm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flux-image-gen", "run", "build" ]
publicDir = "artifacts/flux-image-gen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25907"
BASE_PATH = "/"
