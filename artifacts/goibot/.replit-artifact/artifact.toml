kind = "web"
previewPath = "/"
title = "GoiBot"
version = "1.0.0"
id = "artifacts/goibot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20791

[services.development]
run = "pnpm --filter @workspace/goibot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/goibot", "run", "build" ]
publicDir = "artifacts/goibot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20791"
BASE_PATH = "/"
